name: Release

# Builds endstate.exe + .sha256 and attaches them to the GitHub Release.
#
# Trigger model: dispatched from release-please.yml via `gh workflow run`
# once a new release is cut. The `release: published` trigger is kept as a
# defensive backup in case the release is ever created by a non-
# GITHUB_TOKEN identity (PAT, GitHub App) where the recursion-protection
# rule doesn't apply — but the primary path is workflow_dispatch.
#
# History: an earlier iteration relied on `release: published` firing for
# releases created by release-please-action. That doesn't actually work —
# GitHub blocks GITHUB_TOKEN-triggered events from cascading into other
# workflows (with `workflow_dispatch` and `repository_dispatch` as the
# documented exceptions). Releases v2.0.1 / v2.1.0 / v2.2.1 / v2.3.0
# shipped without binaries as a result. See release-please.yml for the
# dispatch fix.
#
# workflow_dispatch with `tag_name` input also doubles as the manual
# backfill path for any release that pre-dates the fix.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to build and publish assets for (e.g. v1.8.0)'
        required: true

jobs:
  publish-artifacts:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag_name || github.event.release.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: go-engine/go.sum

      - name: Build endstate.exe
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag_name || github.event.release.tag_name }}"
          $version = $tag.TrimStart('v')
          $schemaVersion = (Get-Content SCHEMA_VERSION -Raw).Trim()
          Set-Location go-engine
          go build `
            -ldflags "-X github.com/Artexis10/endstate/go-engine/internal/config.version=$version -X github.com/Artexis10/endstate/go-engine/internal/config.schemaVersion=$schemaVersion" `
            -o ../endstate.exe `
            ./cmd/endstate

      - name: Generate SHA256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash endstate.exe -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path endstate.exe.sha256 -Value $hash -NoNewline

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.event.release.tag_name }}
          files: |
            endstate.exe
            endstate.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release assets are present
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.event.inputs.tag_name || github.event.release.tag_name }}"
          $release = gh release view "$tag" --json assets | ConvertFrom-Json
          $names = $release.assets | ForEach-Object { $_.name }
          $missing = @()
          if ('endstate.exe' -notin $names) { $missing += 'endstate.exe' }
          if ('endstate.exe.sha256' -notin $names) { $missing += 'endstate.exe.sha256' }
          if ($missing.Count -gt 0) {
            Write-Error "Missing release assets: $($missing -join ', ')"
            exit 1
          }
          Write-Host "Verified: endstate.exe and endstate.exe.sha256 are present on release $tag"
