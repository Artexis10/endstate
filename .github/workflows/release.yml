name: Release

# Builds endstate.exe + .sha256 and attaches them to the GitHub Release.
#
# Trigger model: `release: published` fires naturally when release-please
# cuts a release, because release-please.yml now mints its token from the
# endstate-release-bot GitHub App (not GITHUB_TOKEN), and App-created
# events DO cascade into other workflows.
#
# workflow_dispatch with `tag_name` is kept for manual backfills (e.g.
# re-running a build that failed for transient reasons, or attaching
# assets to a pre-App-era release like v2.0.1 / v2.1.0 / v2.2.1).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to build and publish assets for (e.g. v1.8.0)'
        required: true

jobs:
  publish-artifacts:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag_name || github.event.release.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: go-engine/go.sum

      - name: Build endstate.exe
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag_name || github.event.release.tag_name }}"
          $version = $tag.TrimStart('v')
          $schemaVersion = (Get-Content SCHEMA_VERSION -Raw).Trim()
          Set-Location go-engine
          go build `
            -ldflags "-X github.com/Artexis10/endstate/go-engine/internal/config.version=$version -X github.com/Artexis10/endstate/go-engine/internal/config.schemaVersion=$schemaVersion" `
            -o ../endstate.exe `
            ./cmd/endstate

      - name: Generate SHA256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash endstate.exe -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path endstate.exe.sha256 -Value $hash -NoNewline

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.event.release.tag_name }}
          files: |
            endstate.exe
            endstate.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release assets are present
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.event.inputs.tag_name || github.event.release.tag_name }}"
          $release = gh release view "$tag" --json assets | ConvertFrom-Json
          $names = $release.assets | ForEach-Object { $_.name }
          $missing = @()
          if ('endstate.exe' -notin $names) { $missing += 'endstate.exe' }
          if ('endstate.exe.sha256' -notin $names) { $missing += 'endstate.exe.sha256' }
          if ($missing.Count -gt 0) {
            Write-Error "Missing release assets: $($missing -join ', ')"
            exit 1
          }
          Write-Host "Verified: endstate.exe and endstate.exe.sha256 are present on release $tag"
