name: Go Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Go Tests
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: go-engine/go.sum

      - name: Check VERSION drift
        shell: pwsh
        run: |
          $ver = (Get-Content VERSION -Raw).Trim()
          $manifest = (Get-Content .release-please-manifest.json | ConvertFrom-Json).'.'
          if ($ver -ne $manifest) {
            Write-Error "VERSION ($ver) does not match .release-please-manifest.json ($manifest). Sync them."
            exit 1
          }
          Write-Host "VERSION check passed: $ver"

      - name: Vet
        run: cd go-engine && go vet ./...

      - name: Test
        run: cd go-engine && go test ./...
